name: docs

# Build the MkDocs Material site and publish it to GitHub Pages.
# The API reference is generated from the package docstrings (mkdocstrings),
# so a docstring change in src/ rebuilds the reference automatically.

on:
  push:
    branches: [main]
    paths:
      - "mkdocs.yml"
      - "docs/site/**"
      - "docs/requirements.txt"
      - "docs/getting-started.md"
      - "docs/examples.md"
      - "docs/error-handling.md"
      - "docs/logging.md"
      - "src/almaapitk/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-progress run finish rather than cancel.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        # The package itself is installed so mkdocstrings/griffe can always
        # resolve `almaapitk.*` (it also reads source via paths:[src]).
        run: |
          pip install -r docs/requirements.txt
          pip install -e .
      - name: Build site
        run: mkdocs build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

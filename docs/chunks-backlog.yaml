  - id: 5
    title: Deprecation migrations (must precede related coverage)
    description: |
      Three-stage public-API renames. Must land BEFORE any new coverage method that uses the old name — otherwise the new method is migrated twice. `#120` is gating for `#74` (ResourceSharing partner CRUD); `#111` has no current coverage blocker but locks in `Configuration` as the canonical name.
    chunks:
      - name: partners-rename
        issues: [120]
        risk: high
        prereqs: []
        audit: clean
        notes: |
          3-stage migration: (1) add `Partners` as alias, (2) `DeprecationWarning` on `ResourceSharing` import, (3) cutover after a release cycle. **Hard prereq for `#74`** (rs-partners chunk in Phase 13) — otherwise the partner CRUD ships into a name that's about to be deprecated. Solo, careful review.
      - name: admin-deprecate
        issues: [111]
        risk: high
        prereqs: []
        audit: clean
        notes: |
          Mirror of `partners-rename`. 3-stage: `Configuration` alias for `Admin`, deprecation warning, cutover. No current Admin coverage tickets, so timing is opportunistic — pair with `partners-rename` for review economy. Solo, careful review.


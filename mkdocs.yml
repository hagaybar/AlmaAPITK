site_name: AlmaAPITK
site_description: Python toolkit for the Ex Libris Alma ILS API
site_url: https://hagaybar.github.io/AlmaAPITK/
site_author: Hagay Bar
copyright: Copyright &copy; Hagay Bar — MIT License

repo_url: https://github.com/hagaybar/AlmaAPITK
repo_name: hagaybar/AlmaAPITK
edit_uri: edit/main/docs/site/

# Clean-room docs root: the top-level docs/ folder is a working area (run
# logs, audits, specs, swagger). Only docs/site/ is the published website,
# so the kitchen sink — and any future operational doc — never leaks in.
docs_dir: docs/site

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # Static analysis (griffe) over the source tree — no import side
          # effects, so logging/network init never runs at build time.
          paths: [src]
          options:
            docstring_style: google
            docstring_section_style: table
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_source: true
            members_order: source
            merge_init_into_class: true
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets:
      # Pull the canonical long-form guides in from docs/ so there is one
      # source of truth (those files are also test-pinned discoverability
      # surfaces). Paths are resolved from the repo root.
      base_path: ["."]
      check_paths: true

# Be lenient about links inside the included legacy guides (some use
# Jekyll-style relative/absolute paths that only resolve on GitHub) so the
# build does not warn on pre-existing content; still surface bad anchors.
validation:
  links:
    not_found: info
    absolute_links: info
    unrecognized_links: info
    anchors: warn

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Examples: guides/examples.md
      - Error Handling: guides/error-handling.md
      - Logging: guides/logging.md
  - API Reference:
      - reference/index.md
      - Client & Response: reference/client.md
      - Exceptions: reference/exceptions.md
      - Users: reference/users.md
      - Bibliographic Records: reference/bibs.md
      - Acquisitions: reference/acquisitions.md
      - Admin (Sets): reference/admin.md
      - Resource Sharing: reference/resource-sharing.md
      - Analytics: reference/analytics.md
      - Configuration: reference/configuration.md
      - Utilities: reference/utilities.md
